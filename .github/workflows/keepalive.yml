name: Keep Supabase Alive

on:
  schedule:
    - cron: '7 4 * * *'     # 4:07 AM UTC daily
    - cron: '43 11 * * *'   # 11:43 AM UTC daily
    - cron: '19 18 * * *'   # 6:19 PM UTC daily
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Secrets not configured"
            exit 1
          fi
          # Query PostgREST root (triggers DB activity, prevents pause)
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Accept: application/json")
          echo "Ping result: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Response: $(cat /tmp/response.txt | head -200)"
            exit 1
          fi
